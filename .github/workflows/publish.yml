name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org/

      - run: npm install
      - run: npm run build
      - run: npm publish -w vite-plugin-ts-types-to-json --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VITE_PLUGIN_TS_TYPES_TO_JSON }}
